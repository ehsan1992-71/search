<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Advanced Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <a href="index.html">Google Search</a>
        <a href="images.html">Image Search</a>
    </div>

    <div class="advanced-container">
        <h1 class="advanced-title">Advanced Search</h1>

        <form action="https://www.google.com/search">
            <!-- These fields match Google's advanced search parameters -->
            
            <div class="advanced-row">
                <label>All these words:</label>
                <input type="text" name="as_q">
                <span class="hint">Example: cat dog</span>
            </div>

            <div class="advanced-row">
                <label>This exact word or phrase:</label>
                <input type="text" name="as_epq">
                <span class="hint">Example: "exact phrase"</span>
            </div>

            <div class="advanced-row">
                <label>Any of these words:</label>
                <input type="text" name="as_oq">
                <span class="hint">Example: red OR blue</span>
            </div>

            <div class="advanced-row">
                <label>None of these words:</label>
                <input type="text" name="as_eq">
                <span class="hint">Example: -spam</span>
            </div>

            <div class="advanced-submit">
                <input type="submit" value="Advanced Search" class="btn btn-advanced">
            </div>
        </form>
    </div>

</body>
</html>
