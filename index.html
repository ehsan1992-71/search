<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- نوار بالایی با لینک‌ها -->
    <div class="navbar">
        <a href="images.html">Image Search</a>
        <a href="advanced.html">Advanced Search</a>
    </div>

    <!-- بخش اصلی -->
    <div class="main">
        <!-- لوگو (مشابه گوگل) -->
        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>

        <!-- فرم جستجو -->
        <form action="https://www.google.com/search">
            <input type="text" name="q" class="search-bar" placeholder="جستجو در گوگل...">
            
            <div class="buttons">
                <input type="submit" value="Google Search" class="btn">
                <!-- دکمه "I'm Feeling Lucky" -->
                <input type="submit" name="btnI" value="I'm Feeling Lucky" class="btn">
            </div>
        </form>
    </div>

</body>
</html>
