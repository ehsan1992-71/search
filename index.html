<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top right links -->
    <div class="navbar">
        <a href="images.html">Image Search</a>
        <a href="advanced.html">Advanced Search</a>
        
    </div>

    <!-- Main search section -->
    <div class="main">
        <!-- Google logo -->
        <div class="logo">
            <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>

        <!-- Search form -->
        <form action="https://www.google.com/search">
            <input type="text" name="q" class="search-bar" placeholder="Search Google...">
            
            <div class="buttons">
                <input type="submit" value="Google Search" class="btn">
                <!-- "I'm Feeling Lucky" button -->
                <input type="submit" name="btnI" value="I'm Feeling Lucky" class="btn">
            </div>
            
        </form>
    </div>

</body>
</html>
